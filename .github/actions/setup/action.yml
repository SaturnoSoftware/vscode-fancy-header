name: "Project Setup"
description: "Configure Saturno.CICD and install the project runtimes."

inputs:
  submodules-token:
    description: "GitHub token for submodule access"
    required: true
  node-version:
    description: "Node.js version to install"
    required: false
    default: "18"

runs:
  using: composite
  steps:
    - name: Configure submodule access
      shell: pwsh
      env:
        SATURNO_CI_SUBMODULES_TOKEN: ${{ inputs.submodules-token }}
      run: |
        Set-Location -LiteralPath $env:GITHUB_WORKSPACE
        & (Join-Path $env:GITHUB_WORKSPACE "Saturno.CICD/ci/setup-submodules.ps1") -Token $env:SATURNO_CI_SUBMODULES_TOKEN

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      shell: bash
      run: npm ci
