name: quality-gate

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:
    inputs:
      build-number:
        required: false
        type: string
        default: ""
      release-name:
        required: false
        type: string
        default: ""
      artifact-name:
        required: false
        type: string
        default: ""
      upload-artifact:
        required: false
        type: boolean
        default: true
      artifact-if-no-files-found:
        required: false
        type: string
        default: warn
  workflow_dispatch:
    inputs:
      build-number:
        required: false
        type: string
        default: ""
      release-name:
        required: false
        type: string
        default: ""
      artifact-name:
        required: false
        type: string
        default: ""
      upload-artifact:
        required: false
        type: boolean
        default: true
      artifact-if-no-files-found:
        required: false
        type: choice
        default: warn
        options:
          - warn
          - error
          - ignore

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      QUALITY_GATE_BUILD_NUMBER: ${{ inputs.build-number || github.run_number }}
      QUALITY_GATE_ARTIFACT_NAME: ${{ inputs.artifact-name || format('Saturno.VSCode.FancyHeader-build-{0}', github.run_number) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.SATURNO_CI_SUBMODULES_TOKEN || github.token }}

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          submodules-token: ${{ secrets.SATURNO_CI_SUBMODULES_TOKEN || github.token }}

      - name: Run tests
        shell: pwsh
        run: ./Saturno.CICD/test.ps1 -ProjectRoot $PWD

      - name: Build
        shell: pwsh
        run: ./Saturno.CICD/build.ps1 -ProjectRoot $PWD -BuildNumber $env:QUALITY_GATE_BUILD_NUMBER

      - name: Package
        shell: pwsh
        run: ./Saturno.CICD/package.ps1 -ProjectRoot $PWD -BuildNumber $env:QUALITY_GATE_BUILD_NUMBER

      - name: Upload artifacts
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.QUALITY_GATE_ARTIFACT_NAME }}
          path: __DIST/**
          if-no-files-found: ${{ inputs.artifact-if-no-files-found }}
